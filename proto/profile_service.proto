syntax = "proto3";

package truescrub.rpc.profile;

import "proto/common.proto";

message GetProfileRequest {
  int64 player_id = 1;
}

message SeasonSkill {
  truescrub.rpc.common.SkillInfo skill = 1;
  double lower_bound = 2;
  double upper_bound = 3;
}

message RatingComponents {
  double mvp_rating = 1;
  double kill_rating = 2;
  double death_rating = 3;
  double damage_rating = 4;
  double kas_rating = 5;
  optional double impact_rating = 6;
}

message AchievementProgress {
  string achievement_id = 1;
  int32 current_value = 2;
}

message GetProfileResponse {
  truescrub.rpc.common.Player player = 1;
  int32 rounds_won = 2;
  int32 rounds_lost = 3;
  map<int32, SeasonSkill> season_skills = 4;
  RatingComponents overall_rating = 5;
  map<int32, RatingComponents> season_ratings = 6;
  repeated AchievementProgress achievements = 7;
}

message GetSkillHistoryRequest {
  int64 player_id = 1;
  optional int32 season_id = 2;
  string timezone = 3;
}

message SkillHistoryPoint {
  truescrub.rpc.common.Date date = 1;
  truescrub.rpc.common.SkillInfo skill = 2;
  optional double impact_rating = 3;
}

message GetSkillHistoryResponse {
  repeated SkillHistoryPoint history = 1;
}

message GetPlayerRoundsRequest {
  int64 player_id = 1;
}

message RoundRecord {
  truescrub.rpc.common.Date created_at = 1;
  repeated string winning_team_names = 2;
  repeated string losing_team_names = 3;
}

message GetPlayerRoundsResponse {
  repeated RoundRecord rounds = 1;
}

message GetPlayerTeamRecordsRequest {
  int64 player_id = 1;
}

message TeamRecord {
  repeated string team_members = 1;
  int32 rounds_won = 2;
  int32 rounds_lost = 3;
}

message GetPlayerTeamRecordsResponse {
  repeated TeamRecord team_records = 1;
}

service ProfileService {
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {}
  rpc GetSkillHistory(GetSkillHistoryRequest) returns (GetSkillHistoryResponse) {}
  rpc GetPlayerRounds(GetPlayerRoundsRequest) returns (GetPlayerRoundsResponse) {}
  rpc GetPlayerTeamRecords(GetPlayerTeamRecordsRequest) returns (GetPlayerTeamRecordsResponse) {}
}
