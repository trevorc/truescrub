syntax = "proto3";

package truescrub.rpc.highlights;

import "google/protobuf/timestamp.proto";
import "google/protobuf/field_mask.proto";
import "proto/common.proto";

message ListMatchDaysRequest {
  string timezone = 1;
}

message ListMatchDaysResponse {
  repeated truescrub.rpc.common.Date match_days = 1;
}

message GetDailyHighlightsRequest {
  truescrub.rpc.common.Date date = 1;
  string timezone = 2;
  google.protobuf.FieldMask read_mask = 3;
}

message RatingDetails {
  double average_kills = 1;
  double average_deaths = 2;
  double average_damage = 3;
  double average_assists = 4;
  int32 total_kills = 5;
  int32 total_deaths = 6;
  int32 total_damage = 7;
  int32 total_assists = 8;
  double kdr = 9;
  double average_headshots = 10;
  int32 total_headshots = 11;
}

message Accolade {
  string name = 1;
  repeated string details = 2;
}

message DailyHighlight {
  truescrub.rpc.common.Player player = 1;
  truescrub.rpc.common.SkillInfo starting_skill = 2;
  double impact_rating = 3;
  RatingDetails rating_details = 4;
  int32 rounds_played = 5;
  int32 mvps = 6;
  repeated Accolade accolades = 7;
}

message TimeWindow {
  google.protobuf.Timestamp start_inclusive = 1;
  google.protobuf.Timestamp end_exclusive = 2;
}

message SkillGroupChange {
  int64 player_id = 1;
  string steam_name = 2;
  truescrub.rpc.common.SkillInfo previous_skill = 3;
  truescrub.rpc.common.SkillInfo next_skill = 4;
}

message GetDailyHighlightsResponse {
  repeated TimeWindow time_windows = 1;
  int32 rounds_played = 2;
  map<string, int32> most_played_maps = 3;
  repeated DailyHighlight players = 4;
  repeated SkillGroupChange season_skill_group_changes = 5;
}

service HighlightsService {
  rpc ListMatchDays(ListMatchDaysRequest) returns (ListMatchDaysResponse);
  rpc GetDailyHighlights(GetDailyHighlightsRequest) returns (GetDailyHighlightsResponse);
}
