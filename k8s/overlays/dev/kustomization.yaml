apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../apps/client
  - ../../apps/truescrub
  - namespace.yaml
  - gatewayclass.yaml
  - gateway.yaml

secretGenerator:
  - name: external-tls-secret
    namespace: envoy-gateway-system
    type: kubernetes.io/tls
    options:
      disableNameSuffixHash: true
    files:
      - tls.crt=tls.crt
      - tls.key=tls.key
  - name: truescrub
    namespace: truescrub
    literals:
      - shared-key=dev-secret-key

helmCharts:
  - name: gateway-helm
    repo: oci://docker.io/envoyproxy
    version: v1.8.1
    releaseName: eg
    namespace: envoy-gateway-system
    includeCRDs: true

images:
  - name: truescrub-client
    newName: k3d-registry.localhost:5000/truescrub-client
  - name: git.emun.us/trevor/truescrub
    newName: k3d-registry.localhost:5000/truescrub


